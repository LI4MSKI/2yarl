<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Live Board</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: black;
}

input, button {
  padding: 10px;
  font-size: 16px;
}

canvas#regen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

#gameBox {
  position: fixed;
  bottom: 10px;
  right: 10px;
}

#game {
  background: #111;
  border: 1px solid #444;
  cursor: pointer;
}

.tor {
  margin-top: 20px;
  font-size: 14px;
  color: gray;
}
</style>
</head>

<body>

<canvas id="regen"></canvas>

<h1>Live Board</h1>

<!-- ✅ ONLINE COUNTER -->
<p id="online">👀 0 online</p>

<input type="text" id="text" maxlength="10">
<button onclick="senden()">Senden</button>

<div id="liste"></div>
<p id="count"></p>

<div class="tor">
  Onion:
  <a href="http://2yarlpbj2gqduompe47uhbxnaqaexgsjdapxtk7tjv7nugm344yxhgad.onion/" target="_blank">
    öffnen
  </a>
</div>

<div id="gameBox">
  <canvas id="game" width="300" height="100"></canvas>
</div>

<script>
// ✅ FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC-y0qaVZy40CFvGQW2kzNXrOddVR_cjk",
  databaseURL: "https://yarl-c8062-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "yarl-c8062"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ ONLINE SYSTEM
const userId = Date.now() + "-" + Math.floor(Math.random() * 10000);
const onlineRef = db.ref("online/" + userId);

onlineRef.set(true);
onlineRef.onDisconnect().remove();

db.ref("online").on("value", (snapshot) => {
  let count = snapshot.numChildren();
  document.getElementById("online").textContent = "👀 " + count + " online";
});

// ✅ SENDEN
function senden() {
  let value = document.getElementById("text").value.trim();
  if (value === "") return;

  db.ref("texte").push(value);
  document.getElementById("text").value = "";
}

// ✅ FARBEN
function randomColor() {
  return "hsl(" + Math.random() * 360 + ", 100%, 70%)";
}

// ✅ ANZEIGE
db.ref("texte").on("value", (snapshot) => {
  let liste = document.getElementById("liste");
  liste.innerHTML = "";
  let count = 0;

  snapshot.forEach((child) => {
    let p = document.createElement("p");
    p.textContent = child.val();
    p.style.color = randomColor();
    liste.appendChild(p);
    count++;
  });

  document.getElementById("count").textContent = "Einträge: " + count;
});

// ✅ REGEN
const canvas = document.getElementById("regen");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let rainDrops = [];
for (let i = 0; i < 150; i++) {
  rainDrops.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    l: Math.random() * 20 + 10,
    s: Math.random() * 3 + 2
  });
}

function rain() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "rgba(0,150,255,0.5)";

  rainDrops.forEach(d => {
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x, d.y + d.l);
    ctx.stroke();

    d.y += d.s;

    if (d.y > canvas.height) {
      d.y = 0;
      d.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(rain);
}
rain();

// ✅ DINO GAME
const game = document.getElementById("game");
const g = game.getContext("2d");

let running = false;
let frame = 0;
let lastSpawn = 0;

let dino = { x: 30, y: 70, w: 15, h: 15, vy: 0, jumping: false };
let obstacles = [];

game.addEventListener("click", () => {
  if (!running) {
    running = true;
    frame = 0;
    lastSpawn = 0;
    obstacles = [];
    dino = { x: 30, y: 70, w: 15, h: 15, vy: 0, jumping: false };
    loop();
  }
});

document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && running && !dino.jumping) {
    dino.vy = -9;
    dino.jumping = true;
  }
});

function spawnObstacle() {
  if (frame - lastSpawn > 120) {
    obstacles.push({ x: 300, y: 75, w: 10, h: 15 });
    lastSpawn = frame;
  }
}

function loop() {
  if (!running) return;

  frame++;

  g.clearRect(0,0,300,100);

  dino.vy += 0.25;
  dino.y += dino.vy;

  if (dino.y >= 70) {
    dino.y = 70;
    dino.jumping = false;
  }

  g.fillStyle = "white";
  g.fillRect(dino.x, dino.y, dino.w, dino.h);

  spawnObstacle();

  obstacles.forEach((o,i) => {
    o.x -= 2;
    g.fillRect(o.x, o.y, o.w, o.h);

    if (
      dino.x < o.x + o.w &&
      dino.x + dino.w > o.x &&
      dino.y < o.y + o.h &&
      dino.y + dino.h > o.y
    ) {
      running = false;
      alert("Game Over");
    }

    if (o.x < 0) obstacles.splice(i,1);
  });

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
</html>
